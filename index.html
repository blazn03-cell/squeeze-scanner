function getBestStrats(sqType, ivHigh) {
  if (!sqType) return [];
  const m = Object.entries(STRATS).filter(([,s]) =>
    s.best.includes(sqType) && (s.ivNeed==="any"||(s.ivNeed==="high"&&ivHigh)||(s.ivNeed==="low"&&!ivHigh))
  );
  if (m.length < 2) m.push(["diagonal", STRATS.diagonal]);
  return m.slice(0,2);
}

// ── WIN PROBABILITY ───────────────────────────────────────────────────────────
function calcWinProb(p) {
  if (p.cat === "macro") return null;
  let pts = 0;
  const s   = p.short || {};
  const si  = parseFloat(s.si_pct || 0);
  const dtc = parseFloat(s.days_to_cover || 0);
  const soi = p.oi > 0 ? p.size / p.oi : 0;
  const sc  = parseInt(p.staircase_days || 0);
  const pc  = parseFloat(p.options_vol?.put_call_ratio || 0);
  // Core flow confirmation (0-28)
  pts += p.sweepOk && p.dpOk ? 28 : p.sweepOk || p.dpOk ? 12 : 4;
  // Staircase — institutional accumulation (0-20)
  pts += sc >= 7 ? 20 : sc >= 5 ? 15 : sc >= 3 ? 9 : sc >= 2 ? 4 : 0;
  // Repeat sweeps (0-10)
  pts += (p.sweep_count||1) >= 3 ? 10 : (p.sweep_count||1) >= 2 ? 5 : 0;
  // Size vs OI (0-12)
  pts += soi >= 5 ? 12 : soi >= 3 ? 8 : soi >= 2 ? 4 : 0;
  // Short data for squeezes (0-20)
  if (p.cat === "squeeze") {
    pts += si >= 30 ? 10 : si >= 20 ? 7 : si >= 10 ? 3 : 0;
    pts += dtc >= 5 ? 6 : dtc >= 3 ? 3 : 0;
    pts += parseFloat(s.borrow_rate||0) >= 30 ? 2 : 0;
    pts += s.ftds_elevated ? 2 : 0;
  }
  // GEX bias (0-8)
  if (p.gex?.bias === "short_gamma" && p.cat === "squeeze") pts += 8;
  if (p.gex?.bias === "long_gamma"  && p.cat === "flush")   pts += 8;
  // Net premium momentum (0-8)
  if (p.cat === "squeeze" && p.net_prem?.trending === "up")   pts += 8;
  if (p.cat === "flush"   && p.net_prem?.trending === "down") pts += 8;
  if (p.cat === "squeeze" && p.net_prem?.trending === "down") pts -= 5;
  // P/C ratio (0-6)
  if (p.cat === "squeeze" && pc > 0 && pc < 0.5) pts += 6;
  if (p.cat === "flush"   && pc > 1.2)           pts += 6;
  // Ask quality (0-4)
  pts += parseFloat(p.ask_pct||0) >= 0.9 ? 4 : parseFloat(p.ask_pct||0) >= 0.7 ? 2 : 0;
  // OTM bonus (0-2)
  if (p.is_otm) pts += 2;
  // Penalties
  if (p.earnings?.within_14_days) pts = Math.round(pts * 0.7);
  const td = parseInt(p.trade_day || p.day || 1);
  if (td === 2) pts = Math.round(pts * 0.85);
  if (td === 3) pts = Math.round(pts * 0.65);
  if (td >= 7)  pts = Math.round(pts * 0.45);
  return Math.max(5, Math.min(95, pts));
}

function getHoldStatus(td, sqType) {
  const max = (PROF[sqType] || PROF.short_squeeze).holdDays;
  const pct = td / max;
  if (td <= 1)    return { label:"ENTER",       color:"#00ff88", action:"enter" };
  if (pct <= 0.4) return { label:"HOLD",         color:"#ffe033", action:"hold" };
  if (pct <= 0.7) return { label:"MONITOR",      color:"#ffaa44", action:"monitor" };
  if (pct <= 0.9) return { label:"TRIM 25–50%",  color:"#ff9955", action:"prepare" };
  return           { label:"EXIT NOW",      color:"#ff3355", action:"exit" };
}

function getGuidance(p) {
  const prob = p.winProb || 0;
  const prof = PROF[p.sqType] || PROF.short_squeeze;
  const td   = parseInt(p.trade_day || p.day || 1);
  const hs   = getHoldStatus(td, p.sqType);
  const sc   = parseInt(p.staircase_days || 0);
  const lines = [];
  if (p.cat === "macro") {
    lines.push(p.sqType === "macro_bull" ? "Market bias BULLISH. Squeeze setups get a tailwind. Size up on confirmed plays." : "Market bias BEARISH. Strong headwind. Size down everything. Don't fight the tape.");
    return lines;
  }
  if (sc >= 3 && !p.sweepOk)        lines.push(`👀 ${sc}-DAY STAIRCASE — Institutions quietly accumulating at ${p.staircase_zone || "this zone"}. No sweep yet. Watch for call sweeps to fire entry.`);
  else if (hs.action === "exit")     lines.push(`🚨 EXIT NOW — Day ${td}, max hold (${prof.hold}) reached. Sell today. Non-negotiable.`);
  else if (hs.action === "prepare")  lines.push(`⚠️ TRIM — Approaching max hold. Cut 25–50% now. Hold rest if sweeps still printing.`);
  else if (td===1 && p.sweepOk && p.dpOk) lines.push(`✅ ENTER NOW — Both sweep + DP confirmed Day 1${sc>=3?` + ${sc}-day staircase`:""}. ${prob>=65?"High conviction":"Solid"} setup.`);
  else if (td===1 && (p.sweepOk||p.dpOk)) lines.push("⚠️ WAIT — One signal confirmed. Watch for second (sweep OR DP) before entering.");
  else if (td===2 && prob>=50)       lines.push("🟡 HOLD — Day 2. Still valid. Last good entry if not in yet.");
  else if (td===2 && prob<50)        lines.push("⚠️ CAUTION — Day 2, weak signals. Only hold if already in.");
  else                               lines.push("📊 MONITORING — Watch for sweep + DP confirmation before committing capital.");
  const strats = getBestStrats(p.sqType, !!p.iv?.elevated);
  if (strats.length > 0) {
    const [, s] = strats[0];
    lines.push(`BEST PLAY: ${s.emoji} ${s.name} (${s.risk} risk) — ${s.how}`);
    lines.push(`EXIT: ${s.exit}`);
    lines.push(`STOP: ${s.stop}`);
  }
  if (p.earnings?.within_14_days) lines.push("⚠️ EARNINGS in 14 days — IV crush risk. Use spread or skip.");
  if (p.iv?.elevated)             lines.push("⚠️ HIGH IV — Use debit spread to cut IV crush risk in half.");
  if (p.gex?.bias==="short_gamma" && p.cat==="squeeze") lines.push("🔥 SHORT GAMMA — Moves amplified. Squeeze goes further and faster than normal.");
  if (p.sqType==="vol_squeeze")   lines.push("📌 VOL SQUEEZE — IV compressed like a coiled spring. Break will be violent.");
  return lines;
}

function nowETMin() {
  try {
    const parts = new Intl.DateTimeFormat("en-US", { timeZone: "America/New_York", hour12: false, hour: "2-digit", minute: "2-digit" }).formatToParts(new Date());
    const h = +parts.find(p => p.type === "hour").value;
    const m = +parts.find(p => p.type === "minute").value;
    return h * 60 + m;
  } catch { const d = new Date(); return d.getHours()*60 + d.getMinutes(); }
}

// ── 30-DAY HISTORY (localStorage) ─────────────────────────────────────────────
const HIST_KEY = "sfs_history_v1";
const DAY_MS   = 86400000;
const today    = () => new Date().toISOString().slice(0,10);

function loadHist() {
  try { const r = JSON.parse(localStorage.getItem(HIST_KEY)||"{}"); return r && typeof r === "object" ? r : {}; }
  catch { return {}; }
}
function saveHist(h) { try { localStorage.setItem(HIST_KEY, JSON.stringify(h)); } catch(_){} }
function pruneHist(h) {
  const now = Date.now();
  const out = {};
  Object.entries(h).forEach(([k,v]) => {
    const t = new Date(v.last_seen || today()).getTime();
    const ageDays = (now - t)/DAY_MS;
    // Hard cap: drop anything older than 30 days
    if (ageDays > 30) return;
    // Stale-and-never-fired: drop items tracked 3+ days that never showed real follow-through
    // ("fired" = had matched sweep+DP confluence OR cleared 70% win prob OR ≥3 distinct sighting days)
    const fired = (v.sweepOk && v.dpOk) || (v.max_win_prob||0) >= 70 || (v.days_seen?.length||0) >= 3;
    if (ageDays > 3 && !fired) return;
    out[k] = v;
  });
  return out;
}
function recordHist(prints, prev) {
  const h = { ...prev };
  const td = today();
  (prints||[]).forEach(p => {
    if (!p.ticker || !p.sqType) return;
    if (!ALL[p.sqType]) return;
    const key = `${p.ticker}|${p.sqType}`;
    const e = h[key] || {
      ticker: p.ticker, sqType: p.sqType, cat: p.cat,
      first_seen: td, last_seen: td, days_seen: [],
      total_premium: 0, sighting_count: 0, max_win_prob: 0,
      sweepOk: false, dpOk: false,
      latest_strike: "", latest_expiry: "",
      latest_staircase_days: 0,
      congress: null, insider: null, news: null, fda: null, earnings: null, predict: null,
    };
    if (!e.days_seen.includes(td)) e.days_seen.push(td);
    e.last_seen             = td;
    e.total_premium        += parseInt(p.premium)||0;
    e.sighting_count       += 1;
    e.max_win_prob          = Math.max(e.max_win_prob||0, p.winProb||0);
    e.sweepOk               = e.sweepOk || !!p.sweepOk;
    e.dpOk                  = e.dpOk    || !!p.dpOk;
    if (p.strike) e.latest_strike = p.strike;
    if (p.expiry) e.latest_expiry = p.expiry;
    e.latest_staircase_days = Math.max(e.latest_staircase_days||0, parseInt(p.staircase_days)||0);
    // Persist confluence data (always keep the latest non-null snapshot)
    if (p.congress) e.congress = p.congress;
    if (p.insider)  e.insider  = p.insider;
    if (p.news)     e.news     = p.news;
    if (p.fda)      e.fda      = p.fda;
    if (p.earnings) e.earnings = p.earnings;
    if (p.predict && p.predict.any) e.predict = p.predict;
    if (p.gex?.bias) { e.gex_bias = p.gex.bias; e.gex_wall = p.gex.wall || e.gex_wall; }
    h[key] = e;
  });
  return pruneHist(h);
}

// ── WIN-PROB GATE ─────────────────────────────────────────────────────────────
// Hard rule: setup must clear 70% win probability before it counts as actionable.
const WIN_GATE = 70;

// ── POSITION SIZE HINT (discipline layer) ─────────────────────────────────────
// Maps days-building + win-prob to recommended account % per profile rules:
// <70% win prob = WAIT (gate). < 3d = wait, 3-4d = 1%, 5-6d = 2%, 7+d = 3% cap.
function sizingHint(days, winProb) {
  if ((winProb||0) < WIN_GATE) return { pct: "0%", color: "#556677", label: "WAIT <70%" };
  if (days >= 7) return { pct: "3%", color: "#00ff88", label: "MAX SIZE" };
  if (days >= 5) return { pct: "2%", color: "#ffe033", label: "SIZE UP" };
  if (days >= 3) return { pct: "1%", color: "#ff9955", label: "START" };
  return             { pct: "0%", color: "#556677", label: "BUILD"   };
}
function topBuilds(h, cat, sortMode, n, gateOn) {
  return Object.values(h||{})
    .filter(e => e.cat === cat)
    .filter(e => !gateOn || (e.max_win_prob||0) >= WIN_GATE)
    .sort((a,b) => {
      if (sortMode === "premium") {
        if ((b.total_premium||0) !== (a.total_premium||0)) return (b.total_premium||0)-(a.total_premium||0);
        return (b.days_seen?.length||0) - (a.days_seen?.length||0);
      }
      const da = a.days_seen?.length||0, db = b.days_seen?.length||0;
      if (db !== da) return db - da;
      return (b.total_premium||0) - (a.total_premium||0);
    })
    .slice(0, n||10);
}

                      {pos.note.toLowerCase().match(/wedge|break/) && "📌 Technical breakout stacking with flow — strong combo. "}
                      {(pos.note.toLowerCase().includes("ceo")||pos.note.toLowerCase().includes("insider")) && "📌 Insider buying — adds conviction, hold harder. "}
                      {pos.note.toLowerCase().includes("news")     && "⚠️ News catalyst — confirm flow continues post-news day. "}
                      {p.iv?.elevated                              && "⚠️ IV elevated — if in naked calls, roll to spread on next rip. "}
                      {p.gex?.bias==="short_gamma"                 && "🔥 Short gamma — moves faster and bigger here. "}
                      {sc>=3                                       && `📊 ${sc}-day staircase — hold until accumulation zone breaks. `}
                      {p.earnings?.within_14_days                  && `📅 REMINDER: Exit before ${p.earnings.next_date}. Non-negotiable. `}

                )}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [ready,     setReady]     = useState(false);
  const [feed,      setFeed]      = useState([]);
  const [openId,    setOpenId]    = useState(null);
  const [positions, setPositions] = useState({});
  const [newIds,    setNewIds]    = useState(new Set());
  const [logs,      setLogs]      = useState([]);
  const [loading,   setLoading]   = useState(false);
  const [error,     setError]     = useState("");
  const [paused,    setPaused]    = useState(false);
  const [pollSec,   setPollSec]   = useState(120);
  const [minProb,   setMinProb]   = useState(70);
  const [gateOn,    setGateOn]    = useState(true);
  const [minPrem,   setMinPrem]   = useState(0);
  const [confirmed, setConfirmed] = useState(false);
  const [showLog,   setShowLog]   = useState(false);
  const [soundOn,   setSoundOn]   = useState(true);
  const [ticker,    setTicker]    = useState("");
  const [history,   setHistory]   = useState(() => pruneHist(loadHist()));
  const [viewMode,  setViewMode]  = useState("live");   // "live" | "top10"
  const [sortMode,  setSortMode]  = useState("days");    // "days" | "premium"
  const [usage,     setUsage]     = useState({ in:0, out:0, scans:0 });  // cumulative this session
  const [nowMin,    setNowMin]    = useState(() => nowETMin());          // minutes since midnight ET, ticks every 30s
  const [pbOpen,    setPbOpen]    = useState(false);                     // playbook expanded panel
  const [showLegend,setShowLegend]= useState(false);                     // legend strip hidden by default

  const seen       = useRef(new Set());
  const intv       = useRef(null);
  const isFetching = useRef(false);
  const fetchRef   = useRef(null);
  const akRef      = useRef("");
  const ukRef      = useRef("");

  const addLog = useCallback(msg => {
    const t = new Date().toTimeString().slice(0,8);
    setLogs(p => [`[${t}] ${msg}`, ...p.slice(0,99)]);
  }, []);

  const parseArr = useCallback(text => {
    if (!text) return [];
    const c = text.replace(/```json|```/g,"").trim();
    try { const r=JSON.parse(c); return Array.isArray(r)?r:[]; } catch {}
    const m = c.match(/\[[\s\S]*\]/);
    if (m) { try { const r=JSON.parse(m[0]); return Array.isArray(r)?r:[]; } catch {} }
    return [];
  }, []);

  useEffect(() => { fetchRef.current = async () => {
    if (isFetching.current) { addLog("⏳ Already scanning…"); return; }
    isFetching.current=true; setLoading(true); setError("");
    addLog("Scanning: flow + dark pool + staircase detection + enrichment…");
    try {
      // Retry with exponential backoff. AbortController guards each attempt so a hung
      // MCP tool call can't tie up the next scan cycle.
      const SCAN_TIMEOUT_MS = 90000;
      const MAX_ATTEMPTS    = 3;
      let res, lastErr;
      for (let attempt=1; attempt<=MAX_ATTEMPTS; attempt++) {
        const ctrl = new AbortController();
        const timer = setTimeout(()=>ctrl.abort(), SCAN_TIMEOUT_MS);
        try {
          res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST",
            signal: ctrl.signal,
            headers:{
              "Content-Type":"application/json",
              "x-api-key":akRef.current,
              "anthropic-version":"2023-06-01",
              "anthropic-beta":"mcp-client-2025-04-04",
              "anthropic-dangerous-direct-browser-access":"true"
            },
            body:JSON.stringify({
              model:"claude-sonnet-4-5",
              max_tokens:2000,
              system: buildSystem(ukRef.current),
              messages:[{ role:"user", content:"Run full scan now. Return only the JSON array starting with [" }],
              mcp_servers:[{ type:"url", url:"https://api.unusualwhales.com/api/mcp", name:"unusual-whales", authorization_token:ukRef.current }]
            })
          });
          clearTimeout(timer);
          break;
        } catch (netErr) {
          clearTimeout(timer);
          lastErr = netErr;
          const aborted = netErr.name === "AbortError";
          const why = aborted
            ? `timed out after ${SCAN_TIMEOUT_MS/1000}s (MCP tool call probably hung)`
            : !navigator.onLine
              ? "you appear to be offline"
              : `browser blocked the request — ${netErr.message} (likely CORS or invalid Anthropic key)`;
          if (attempt < MAX_ATTEMPTS) {
            const wait = 2000 * attempt;
            addLog(`⏳ Attempt ${attempt}/${MAX_ATTEMPTS} failed (${why}) — retrying in ${wait/1000}s…`);
            await new Promise(r=>setTimeout(r, wait));
            continue;
          }
          throw new Error(`Network after ${MAX_ATTEMPTS} attempts: ${why}`);
        }
      }
      if (!res) throw lastErr || new Error("No response");
      if (!res.ok) {
        const e = await res.json().catch(()=>({}));
        const msg = e?.error?.message || `HTTP ${res.status}`;
        if (msg.includes("concurrents")||msg.includes("exceeded_limit")||res.status===429) {
          addLog("⏳ Rate limit — waiting 45s…"); setError("Rate limited…");
          await new Promise(r=>setTimeout(r,45000));
          setError(""); isFetching.current=false; setLoading(false); return;
        }
        if (res.status===529 || res.status===503 || res.status===500) {
          addLog(`⏳ Anthropic overloaded (HTTP ${res.status}) — waiting 60s…`); setError(`Anthropic ${res.status}…`);
          await new Promise(r=>setTimeout(r,60000));
          setError(""); isFetching.current=false; setLoading(false); return;
        }
        if (res.status===401) throw new Error("Invalid Anthropic API key (401)");
        throw new Error(`HTTP ${res.status}: ${msg.slice(0,150)}`);
      }
      const data = await res.json();
      const u = data.usage || {};
      const inTok  = (u.input_tokens||0) + (u.cache_creation_input_tokens||0) + (u.cache_read_input_tokens||0);
      const outTok = u.output_tokens||0;
      if (inTok || outTok) {
        setUsage(prev => ({ in: prev.in + inTok, out: prev.out + outTok, scans: prev.scans + 1 }));
        const cost = (inTok*3 + outTok*15) / 1e6;
        addLog(`Tokens: ${inTok} in / ${outTok} out · ~$${cost.toFixed(3)} this scan`);
      }
      const tools = (data.content||[]).filter(b=>b.type==="mcp_tool_use");
      if (tools.length) addLog(`Tools used: ${[...new Set(tools.map(t=>t.name))].join(", ")}`);
      const raw = ((data.content||[]).find(b=>b.type==="text")?.text)||"";
      addLog(`Response: ${raw.length} chars`);
      const prints = parseArr(raw);
      if (!prints.length) { addLog("⚠ No valid JSON — will retry next cycle"); if(raw) addLog(`Snippet: ${raw.slice(0,100)}`); return; }
      const freshIds = new Set();
      const fresh = prints
        .filter(p=>p.ticker&&p.sig)
        .map(p=>({
          ...p,
          cat: ALL[p.sig]?.cat||(SQ[p.sqType]?"squeeze":FL[p.sqType]?"flush":"macro"),
          trade_day: Math.max(1,Math.min(21,parseInt(p.trade_day||p.day||1))),
          day: Math.max(1,Math.min(3,parseInt(p.day||1))),
          size:parseInt(p.size)||0, oi:parseInt(p.oi)||0, premium:parseInt(p.premium)||0,
          sweepOk:!!p.sweepOk, dpOk:!!p.dpOk,
          staircase_days:parseInt(p.staircase_days)||0,
          time:p.time||new Date().toTimeString().slice(0,8),
          id:p.id||`${p.ticker}-${p.sig}-${Date.now()}-${Math.random().toString(36).slice(2)}`,
        }))
        .map(p=>({...p, winProb:calcWinProb(p)}))
        .filter(p=>{
          if (parseInt(p.premium||0) < minPrem) return false;
          const uid=`${p.ticker}-${p.sqType}-${p.strike}-${p.expiry}`;
          if (seen.current.has(uid)) return false;
          seen.current.add(uid); freshIds.add(p.id); return true;
        });
      if (fresh.length>0) {
        if (soundOn&&fresh.some(p=>p.sweepOk&&p.dpOk&&(p.winProb||0)>=60)) beep();
        setNewIds(freshIds); setTimeout(()=>setNewIds(new Set()),12000);
        setFeed(prev=>[...fresh,...prev].slice(0,300));
        // Record in 30-day localStorage memory
        setHistory(prev => { const next = recordHist(fresh, prev); saveHist(next); return next; });
        const types=[...new Set(fresh.map(p=>p.sqType).filter(Boolean))];
        const sc=fresh.filter(p=>(p.staircase_days||0)>=3).length;
        addLog(`✓ ${fresh.length} signals · ${types.join(", ")} · ${sc} staircase · recorded to 30d memory`);
        setError("");
      } else addLog(`Got ${prints.length} items — none passed filters`);
    } catch(e) {
      setError(e.message.slice(0,100));
      addLog(`✗ ${e.message.slice(0,150)}`);
    } finally { isFetching.current=false; setLoading(false); }
  }; });

  useEffect(() => {
    if (!ready) return;
    const t = setTimeout(()=>fetchRef.current?.(),1200);
    intv.current = setInterval(()=>{ if(!paused) fetchRef.current?.(); }, Math.max(pollSec,60)*1000);

  useEffect(()=>{ if(paused) clearInterval(intv.current); }, [paused]);

  const connect = (a, u) => {

  const doFilter = items => items
    .filter(p =>

      (!confirmed||(p.sweepOk&&p.dpOk)) &&
      (!ticker.trim()||p.ticker.includes(ticker.trim().toUpperCase())) &&

  if (!ready) return (

  const trackedCount = Object.keys(history||{}).length;
  const stopHits = Object.entries(positions).filter(([,pp]) => {
    const c = parseFloat(pp?.currentPrice), s = parseFloat(pp?.stopPrice);

  const winLocks = Object.entries(positions).filter(([,pp]) => {
    const e = parseFloat(pp?.entryPrice), c = parseFloat(pp?.currentPrice);
    return !isNaN(e) && !isNaN(c) && e > 0 && ((c-e)/e) >= 0.5;
  }).map(([id]) => feed.find(p=>p.id===id)).filter(Boolean);
  const mBull = macros.filter(p=>p.sig==="macro_bull").length;

  return (

      {earnAlerts.length>0 && (
        <div style={{ background:"#0e0000", borderBottom:"1px solid #ff444422", padding:"6px 20px", display:"flex", gap:10, alignItems:"center", flexShrink:0 }}>
          <span style={{ fontSize:12 }}>📅</span>
          <div style={{ fontSize:9, color:"#cc3333" }}>{earnAlerts.map(p=>`${p?.ticker} earns ${p?.earnings?.next_date}`).join(" · ")} — Exit options before earnings.</div>
        </div>
      )}
      {stopHits.length>0 && (
        <div className="urgent" style={{ background:"#110005", borderBottom:"1px solid #ff3355", padding:"8px 20px", display:"flex", gap:12, alignItems:"center", flexShrink:0 }}>
          <span style={{ fontSize:16 }}>🛑</span>

          <div style={{ width:1, height:30, background:"#1a2a3a", marginRight:20 }}/>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginRight:20 }}>
            <div className={loading?"":"live"} style={{ width:8, height:8, borderRadius:"50%", background:error?"#ff3355":loading?"#ffe033":paused?"#6e88a0":"#00ff88", boxShadow:`0 0 8px ${error?"#ff3355":loading?"#ffe033":paused?"#6e88a0":"#00ff88"}66` }}/>
            <span style={{ fontSize:11, fontWeight:600, color:error?"#ff3355":loading?"#ffe033":paused?"#8aa3b8":"#00ff88", letterSpacing:"0.1em" }}>{error?"ERROR":loading?"SCANNING…":paused?"PAUSED":"LIVE"}</span>
          </div>
          <div style={{ width:1, height:30, background:"#1a2a3a", marginRight:20 }}/>
          <div style={{ marginRight:20 }}>
            <div style={{ fontSize:10, color:"#7591a8", letterSpacing:"0.15em", fontWeight:500 }}>MARKET</div>
            <div style={{ fontSize:13, fontWeight:700, color:biasC, letterSpacing:"0.03em" }}>{bias}</div>
          </div>
          {hcCount>0 && <div style={{ marginRight:8, padding:"4px 10px", background:"#ffe03318", border:"1px solid #ffe03344", fontSize:10, fontWeight:600, color:"#ffe033", borderRadius:3 }}>{hcCount} HIGH CONV</div>}
          {scCount>0 && <div style={{ marginRight:8, padding:"4px 10px", background:"#00ddff18", border:"1px solid #00ddff44", fontSize:10, fontWeight:600, color:"#00ddff", borderRadius:3 }}>📊 {scCount} STAIRCASE</div>}
          {gexAmp>0 && <div title={`GEX amplifying ${gexAmp} setup${gexAmp>1?"s":""} — dealers ${gexShort?"short gamma on "+gexShort+" squeeze"+(gexShort>1?"s":""):""}${gexShort&&gexLong?", ":""}${gexLong?"long gamma on "+gexLong+" flush"+(gexLong>1?"es":""):""}`} style={{ marginRight:8, padding:"4px 10px", background:"#ff88cc18", border:"1px solid #ff88cc55", fontSize:10, fontWeight:600, color:"#ff88cc", borderRadius:3 }}>🔥 {gexAmp} GEX{gexShort>0?` ↑${gexShort}`:""}{gexLong>0?` ↓${gexLong}`:""}</div>}
          {trackedCount>0 && <div title="30-day backup list — pre-squeeze builds tracked across days, in case the move hasn't fired yet" style={{ marginRight:8, padding:"4px 10px", background:"#66ccff18", border:"1px solid #66ccff44", fontSize:10, fontWeight:600, color:"#66ccff", borderRadius:3 }}>🧠 {trackedCount} TRACKED · 30D BACKUP</div>}
          {usage.scans>0 && (() => {
            const cost = (usage.in*3 + usage.out*15) / 1e6;
            const perScan = cost / usage.scans;
            return <div title={`Session: ${usage.scans} scan${usage.scans>1?"s":""} · ${usage.in.toLocaleString()} in / ${usage.out.toLocaleString()} out tokens · ~$${perScan.toFixed(3)}/scan · model: claude-sonnet-4-5 ($3/M in, $15/M out)`} style={{ marginRight:8, padding:"4px 10px", background:"#ffcc6618", border:"1px solid #ffcc6644", fontSize:10, fontWeight:600, color:"#ffcc66", borderRadius:3 }}>💰 ${cost.toFixed(2)} · {usage.scans} scan{usage.scans>1?"s":""}</div>;
          })()}
          {error && <div style={{ padding:"3px 10px", background:"#ff000011", border:"1px solid #ff333322", fontSize:9, color:"#ff3355", maxWidth:200, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>✗ {error}</div>}
          <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:6 }}>
            <input value={ticker} onChange={e=>setTicker(e.target.value)} placeholder="TICKER…"
              style={{ width:80, background:"#080e16", border:"1px solid #0e1a24", color:"#6080a0", padding:"4px 8px", fontSize:9, outline:"none", fontFamily:"inherit" }}/>
            <select value={minPrem} onChange={e=>setMinPrem(+e.target.value)} style={{ background:"#080e16", border:"1px solid #0e1a24", color:"#6080a0", padding:"4px 6px", fontSize:9, outline:"none", cursor:"pointer" }}>
              {[0,50000,100000,250000,500000].map(v=><option key={v} value={v} style={{background:"#080e16"}}>{v===0?"ANY PREM":v>=1e6?`$${v/1e6}M+`:`$${v/1e3}K+`}</option>)}
            </select>
            <select value={minProb} onChange={e=>setMinProb(+e.target.value)} style={{ background:"#080e16", border:"1px solid #0e1a24", color:"#6080a0", padding:"4px 6px", fontSize:9, outline:"none", cursor:"pointer" }}>
              {[70,60,50,40,30,0].map(v=><option key={v} value={v} style={{background:"#080e16"}}>{v===0?"ALL WIN%":v+"%+"}</option>)}
            </select>
            <select value={pollSec} onChange={e=>setPollSec(+e.target.value)} style={{ background:"#080e16", border:"1px solid #0e1a24", color:"#6080a0", padding:"4px 6px", fontSize:9, outline:"none", cursor:"pointer" }}>
              {[60,90,120,180].map(v=><option key={v} value={v} style={{background:"#080e16"}}>{v}s</option>)}
            </select>
            {[
              { icon:"📡", label:"LIVE",   active:viewMode==="live",  onClick:()=>setViewMode("live"),  ac:"#00ff88" },
              { icon:"🏆", label:"TOP 10", active:viewMode==="top10", onClick:()=>setViewMode("top10"), ac:"#66ccff" },
              { icon:"🎯", label: gateOn?"70% GATE":"GATE OFF", active:gateOn, onClick:()=>setGateOn(g=>!g), ac:"#00ff88" },
              { icon: sortMode==="days"?"📅":"💰", label: sortMode==="days"?"DAYS":"PREM", active:true, onClick:()=>setSortMode(m=>m==="days"?"premium":"days"), ac:"#ffe033" },
              { icon:"🗑", label:"30D", active:false, onClick:()=>{ if(confirm("Clear 30-day build history?")){ setHistory({}); saveHist({}); } }, ac:"#ff9955" },
              { icon:"⚡", label:"CONFIRMED", active:confirmed, onClick:()=>setConfirmed(p=>!p), ac:"#ffe033" },
              { icon:soundOn?"🔔":"🔕",  label:"",    active:soundOn, onClick:()=>setSoundOn(p=>!p), ac:"#00ff88" },
              { icon:"⟳",   label:"",     active:false, onClick:manualFetch, disabled:loading },
              { icon:paused?"▶":"⏸", label:"", active:paused, onClick:()=>setPaused(p=>!p), ac:"#6080a0" },
              { icon:"≡",   label:"LOG",  active:showLog, onClick:()=>setShowLog(p=>!p), ac:"#7aaed0" },
            ].map(({icon,label,active,onClick,disabled,ac="#ffe033"})=>(
              <button key={icon+label} onClick={disabled?undefined:onClick}
                style={{ padding:"5px 10px", background:active?"#080e16":"transparent", border:`1px solid ${active?ac+"44":"#0e1a24"}`, color:disabled?"#2e4055":active?ac:"#4a6070", fontSize:9, cursor:disabled?"default":"pointer", display:"flex", alignItems:"center", gap:5, letterSpacing:"0.08em", fontFamily:"inherit" }}>
                {icon}{label&&<span>{label}</span>}
              </button>
            ))}
          </div>
        </div>
        {(() => {
          // PLAYBOOK BAR — current step (based on ET clock) + next step preview
          let curIdx = -1;
          for (let i = 0; i < PLAYBOOK.length; i++) { if (PLAYBOOK[i].t <= nowMin) curIdx = i; else break; }
          const cur  = curIdx >= 0 ? PLAYBOOK[curIdx]  : null;
          const nxt  = PLAYBOOK[curIdx + 1] || null;
          const nowLabel = (() => { const h = Math.floor(nowMin/60), m = nowMin%60; const am = h<12; const hh = ((h+11)%12)+1; return `${hh}:${m.toString().padStart(2,"0")} ${am?"AM":"PM"} ET`; })();
          return (
            <div style={{ borderTop:"1px solid #0e1a24", background:"#04080c" }}>
              <div onClick={()=>setPbOpen(o=>!o)} style={{ display:"flex", gap:14, padding:"7px 20px", cursor:"pointer", alignItems:"center", flexWrap:"wrap" }}>
                <span style={{ fontSize:11, color:"#7591a8", letterSpacing:"0.12em", fontWeight:600 }}>📖 PLAYBOOK</span>
                <span style={{ fontSize:10, color:"#5a7a92" }}>{nowLabel}</span>
                {cur ? (
                  <span style={{ fontSize:11, color:cur.color, fontWeight:600 }}>NOW · {cur.time} · {cur.title}</span>
                ) : (
                  <span style={{ fontSize:11, color:"#5a7a92", fontStyle:"italic" }}>Pre-market starts at 8:30 AM ET</span>
                )}
                {nxt && (
                  <span style={{ fontSize:10, color:"#7591a8" }}>→ NEXT: <span style={{ color:nxt.color }}>{nxt.time} · {nxt.title}</span></span>
                )}
                <span style={{ marginLeft:"auto", display:"flex", gap:14, alignItems:"center" }}>
                  <span style={{ fontSize:10, color:"#5a7a92" }}>{feed.length} signals</span>
                  <span onClick={e=>{e.stopPropagation(); setShowLegend(s=>!s);}} title="Show/hide icon legend" style={{ fontSize:10, color:showLegend?"#ffe033":"#5a7a92", border:`1px solid ${showLegend?"#ffe03344":"#1a2a3a"}`, padding:"2px 7px", borderRadius:3, cursor:"pointer" }}>?</span>
                  <span style={{ fontSize:10, color:"#7591a8" }}>{pbOpen ? "▴ collapse" : "▾ expand"}</span>
                </span>
              </div>
              {pbOpen && (
                <div style={{ padding:"12px 20px 16px", borderTop:"1px solid #0e1a24", background:"#06101a" }}>
                  {cur && (
                    <div style={{ background:"#080e16", border:`1px solid ${cur.color}55`, borderLeft:`3px solid ${cur.color}`, padding:"10px 14px", marginBottom:10, borderRadius:4 }}>
                      <div style={{ fontSize:10, color:cur.color, fontWeight:700, letterSpacing:"0.12em", marginBottom:4 }}>NOW · {cur.phase.toUpperCase()}</div>
                      <div style={{ fontSize:14, color:"#eaf2ff", fontWeight:700, marginBottom:6 }}>{cur.time} · {cur.title}</div>
                      <div style={{ fontSize:12, color:"#b0c4d8", lineHeight:1.6 }}>{cur.body}</div>
                    </div>
                  )}
                  {nxt && (
                    <div style={{ background:"#04080c", border:`1px solid #0e1a24`, borderLeft:`3px solid ${nxt.color}88`, padding:"8px 14px", marginBottom:10, borderRadius:4, opacity:0.85 }}>
                      <div style={{ fontSize:10, color:nxt.color, fontWeight:600, letterSpacing:"0.12em", marginBottom:3 }}>NEXT · {nxt.phase.toUpperCase()}</div>
                      <div style={{ fontSize:12, color:"#cfdde9", fontWeight:600, marginBottom:4 }}>{nxt.time} · {nxt.title}</div>
                      <div style={{ fontSize:11, color:"#9bb3c6", lineHeight:1.55 }}>{nxt.body}</div>
                    </div>
                  )}
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginTop:10 }}>
                    {PLAYBOOK.map((s, i) => {
                      const isCur = i === curIdx, isPast = i < curIdx;
                      return (
                        <span key={s.t} style={{ fontSize:9, padding:"3px 7px", borderRadius:3, border:`1px solid ${isCur?s.color:"#1a2a3a"}`, background:isCur?s.color+"22":"transparent", color:isCur?s.color:isPast?"#3a5060":"#7591a8", textDecoration:isPast?"line-through":"none", letterSpacing:"0.04em" }} title={s.title}>
                          {s.time}
                        </span>
                      );
                    })}
                  </div>
                </div>
              )}
              {showLegend && (
                <div style={{ display:"flex", gap:18, padding:"6px 20px", borderTop:"1px solid #0e1a24", background:"#04080c", flexWrap:"wrap" }}>
                  {[{i:"📊",t:"Staircase = 3+ day DP accumulation",c:"#00ddff"},{i:"👀",t:"Early = staircase, no sweep yet",c:"#22aacc"},{i:"⚡",t:"Both = sweep + DP confirmed",c:"#ffe033"},{i:"γ↑",t:"Short gamma = squeeze amplified",c:"#ff88cc"},{i:"γ↓",t:"Long gamma = flush amplified",c:"#ff6600"},{i:"⚠",t:"High IV = use spread",c:"#ffaa44"}].map(({i,t,c})=>(
                    <span key={i} style={{ fontSize:10, display:"flex", gap:6, alignItems:"center" }}><span style={{color:c, fontWeight:700}}>{i}</span><span style={{color:"#7591a8"}}>{t}</span></span>
                  ))}
                </div>
              )}
            </div>
          );
        })()}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:showLog?"1fr 1fr 0.7fr 200px":"1fr 1fr 0.7fr", flex:1, overflow:"hidden", background:"#05090e" }}>
        <Column title="🚀 SQUEEZES" color="#00ff88" items={squeezes} openId={openId} onToggle={toggle} positions={positions} onSave={savePos} newIds={newIds} viewMode={viewMode} sortMode={sortMode} topEntries={topSq}/>
        <Column title="🩸 FLUSHES"  color="#ff3355" items={flushes}  openId={openId} onToggle={toggle} positions={positions} onSave={savePos} newIds={newIds} viewMode={viewMode} sortMode={sortMode} topEntries={topFl}/>
        <Column title="📊 MACRO/ETF" color="#66ccff" items={macros}  openId={openId} onToggle={toggle} positions={positions} onSave={savePos} newIds={newIds} viewMode={viewMode} sortMode={sortMode} topEntries={topMc}/>
        {showLog && (
          <div style={{ display:"flex", flexDirection:"column", background:"#04080c", borderLeft:"1px solid #0e1a24" }}>
            <div style={{ padding:"10px 14px", borderBottom:"1px solid #1a2a3a", fontSize:11, color:"#a7c0d4", letterSpacing:"0.14em", fontWeight:700 }}>ACTIVITY LOG</div>
            <div style={{ overflowY:"auto", flex:1, padding:"10px 12px" }}>
              {logs.map((l,i)=><div key={i} style={{ fontSize:11, color:l.includes("✓")?"#44ddaa":l.includes("✗")?"#ff7799":"#9bb3c6", marginBottom:5, lineHeight:1.6, paddingLeft:10, borderLeft:`2px solid ${l.includes("✓")?"#00ff8866":l.includes("✗")?"#ff335566":"#1a2a3a"}`, fontFamily:"'JetBrains Mono','SF Mono',Menlo,Consolas,monospace" }}>{l}</div>)}
              {!logs.length && <div style={{ fontSize:11, color:"#7591a8", fontStyle:"italic" }}>Waiting for first scan…</div>}
            </div>
          </div>
        )}
      </div>

      <div style={{ padding:"6px 20px", background:"#04080c", borderTop:"1px solid #0e1a24", fontSize:10, color:"#7591a8", display:"flex", justifyContent:"space-between", flexShrink:0, gap:12 }}>
        <span>flow-alerts · darkpool · market-tide · earnings · congress · insider · news · fda · shorts · gex · vol · price-levels · 30d backup</span>
        <span style={{whiteSpace:"nowrap", color:"#8aa3b8"}}>⚠ Education only · Not financial advice</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
